<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Dark background from the FIRST frame, before the main CSS loads
         (which in dev is injected by the JS). Without this, the browser paints
         its default white background for an instant: the "flashbang" on entry. -->
    <meta name="color-scheme" content="dark" />
    <style>
      html {
        background: #11091a;
      }
    </style>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- Browser bar color (Android Chrome) matching the cave -->
    <meta name="theme-color" content="#11091a" />
    <!-- Fullscreen mode on "Add to Home Screen" (iOS and standard) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fonts: requested separately (with display=swap) so as NOT to block
         rendering while waiting for Google Fonts; until they arrive the
         system monospace is used as a fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap"
    />
    <!-- Language before the first paint: the HTML carries the text in Spanish
         by default. We set <html lang> right now and, if the detected language
         is NOT Spanish, we hide the "chrome" (title, subtitle, footer, rotate
         notice) with the .pre-i18n class until main.ts translates it. That way an
         English visitor doesn't see a flash of Spanish. main.ts removes the
         class. Same detection as src/game/i18n.ts (saved > browser). -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('cristales-lang');
          var lang =
            s === 'es' || s === 'en'
              ? s
              : (navigator.language || 'es').toLowerCase().indexOf('es') === 0
                ? 'es'
                : 'en';
          document.documentElement.lang = lang;
          if (lang !== 'es') document.documentElement.classList.add('pre-i18n');
        } catch (e) {
          /* no localStorage: we keep the HTML's default Spanish */
        }
      })();
    </script>
    <!-- The app's CSS as a <link> (blocks rendering until applied): that way
         the first paint already comes styled and there's no flash of raw HTML.
         In dev, importing it from the JS injected it late (FOUC). -->
    <link rel="stylesheet" href="/src/style.css" />
    <title>Cristales de la Cueva</title>
  </head>
  <body>
    <!-- The page is ONLY the game's frame: no title, subtitle or
         instructions in HTML. All of that lives inside the canvas (game
         menus), like a real game.
         width/height fixed in the HTML (not only via JS) so the canvas
         has its correct size from the first paint: no layout shift
         nor empty box while the game loads. -->
    <canvas id="game" width="320" height="176"></canvas>
    <!-- Rotate notice: the cave is landscape. In portrait the game would fit in
         a thin strip; this overlay (touch + portrait only, via CSS) asks to
         rotate the phone to play fullscreen. -->
    <div class="rotate-hint" id="rotate-hint" aria-hidden="true">
      <div class="rotate-phone">📱</div>
      <p class="rotate-title">GIRA EL TELÉFONO</p>
      <p class="rotate-sub">La cueva se juega en horizontal</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
